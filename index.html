<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imuh — Live Broadcast Avatar</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Full-screen background broadcast video (muted, looping) -->
    <video id="bg-video" playsinline muted loop></video>

    <!-- Virtual anchor, docked bottom-right -->
    <sv-presenter id="presenter" hidden></sv-presenter>

    <!-- Subtitles, bottom-center -->
    <div id="subtitles" class="subtitles" aria-live="polite"></div>

    <!-- HUD: start gesture + status -->
    <div id="hud" class="hud">
      <button id="start-btn" class="start-btn">▶ 開始直播</button>
      <span id="status" class="status"></span>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
